name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ''
          CI: false
        run: |
          npm ci
          npm run build

      - name: Deploy backend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "backend/app/,backend/server.py,backend/requirements.txt"
          target: "/var/www/lizam/backend/"
          strip_components: 1

      - name: Deploy frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "frontend/build/"
          target: "/var/www/lizam/frontend/"
          strip_components: 2

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/lizam/backend
            ./venv/bin/pip install -r requirements.txt -q 2>/dev/null || true
            systemctl restart lizam
            systemctl reload nginx
            sleep 3
            curl -s http://localhost/api/healthz | grep -q "ok" && echo "Deploy SUCCESS!" || echo "ERROR: backend not responding"
