name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ''
          CI: false
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Deploy backend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "backend/app/,backend/server.py,backend/requirements.txt"
          target: "/var/www/lizam/backend/"
          strip_components: 1

      - name: Deploy frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "frontend/build/"
          target: "/var/www/lizam/frontend/"
          strip_components: 2

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/lizam/backend
            ./venv/bin/pip install -r requirements.txt -q 2>/dev/null || true
            systemctl restart lizam
            systemctl reload nginx
            sleep 3
            curl -s http://localhost/api/healthz | grep -q "ok" && echo "Deploy SUCCESS!" || echo "ERROR: backend not responding"

      - name: Setup domain & SSL
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            if [ -d /etc/letsencrypt/live/lizamcenter.com ]; then
              # SSL cert exists — write full HTTPS nginx config manually
              cat > /etc/nginx/sites-available/lizam << 'NGINXEOF'
            server {
                listen 80;
                server_name lizamcenter.com www.lizamcenter.com;
                return 301 https://$host$request_uri;
            }

            server {
                listen 443 ssl;
                server_name lizamcenter.com www.lizamcenter.com;

                ssl_certificate     /etc/letsencrypt/live/lizamcenter.com/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/lizamcenter.com/privkey.pem;
                include             /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

                root /var/www/lizam/frontend;
                index index.html;

                location / {
                    try_files $uri $uri/ /index.html;
                }

                location /api/ {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    client_max_body_size 50M;
                }

                location /uploads/ {
                    alias /var/www/lizam/backend/uploads/;
                }
            }
            NGINXEOF
              certbot renew --quiet || true
              echo "HTTPS nginx config written OK"

            else
              # First time — write HTTP-only config, run certbot to get cert + set up HTTPS
              cat > /etc/nginx/sites-available/lizam << 'NGINXEOF'
            server {
                listen 80;
                server_name lizamcenter.com www.lizamcenter.com _;

                root /var/www/lizam/frontend;
                index index.html;

                location / { try_files $uri $uri/ /index.html; }

                location /api/ {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    client_max_body_size 50M;
                }

                location /uploads/ {
                    alias /var/www/lizam/backend/uploads/;
                }
            }
            NGINXEOF
              nginx -t && systemctl reload nginx
              which certbot || (apt-get update -qq && apt-get install -y -q certbot python3-certbot-nginx)
              certbot --nginx \
                -d lizamcenter.com -d www.lizamcenter.com \
                --non-interactive --agree-tos \
                --email admin@lizam.sa --redirect \
                && echo "SSL setup complete!" \
                || echo "WARNING: Certbot failed — retry on next deploy"
            fi

            nginx -t && systemctl reload nginx && echo "nginx reloaded OK"
