name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ''
          CI: false
        run: |
          npm ci
          npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 120s
          script: |
            # Backup current state
            cp -r /var/www/lizam/backend/app /tmp/lizam_backup_app 2>/dev/null || true

      - name: Upload backend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "backend/app/,backend/server.py,backend/requirements.txt"
          target: "/var/www/lizam/backend/"
          strip_components: 1

      - name: Upload frontend build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "frontend/build/"
          target: "/var/www/lizam/frontend/"
          strip_components: 2

      - name: Restart backend & reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/lizam/backend
            ./venv/bin/pip install -r requirements.txt -q 2>/dev/null || true
            systemctl restart lizam
            systemctl reload nginx
            sleep 2
            curl -s http://localhost/api/healthz | grep -q "ok" && echo "Deploy SUCCESS!" || echo "Check backend logs"
